<script>
    // 1. 題目資料 (包含 C6 及 C7 重點題目)
    const questions = [
        { topic: "C6", q: "[C6 熱帶雨林]\n1. 熱帶雨林氣候的年溫差通常為多少？", keyword: "Q1", options: ["1-2℃", "5-10℃", "10-15℃", "20℃以上"], ans: 0, hint: "💡 小提示：熱帶雨林接近赤道，全年受太陽直射，氣溫極穩定。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n2. 下列哪項是熱帶雨林土壤貧瘠的主要原因？\n(1) 強烈的淋溶作用\n(2) 龐大生物量迅速吸收養分\n(3) 缺乏枯枝落葉", keyword: "Q2", options: ["只有(1)(2)", "只有(1)(3)", "只有(2)(3)", "(1)(2)(3)"], ans: 0, hint: "💡 小提示：雨林其實有大量枯枝落葉，但分解極快，養分迅速被植物吸收或被雨水沖走（淋溶）。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n3. 熱帶雨林土壤呈紅色的原因是？", keyword: "Q3", options: ["腐殖質含量高", "鐵和鋁的氧化物積聚", "火山灰沉積", "缺乏水分"], ans: 1, hint: "💡 小提示：強烈淋溶作用沖走可溶性礦物，留下不溶的鐵和鋁氧化物（磚紅壤）。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n4. 關於雨林植被特徵，下列哪項不正確？", keyword: "Q4", options: ["樹皮平滑而薄", "具有滴水葉尖", "根部深長以吸取地下水", "具有板根支撐"], ans: 2, hint: "💡 小提示：雨林水分充足且養分集中在表土，植物多為淺根系，不需要深根吸水。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n5. 熱帶雨林分層結構中，哪一層的光度最低、相對濕度最高？", keyword: "Q5", options: ["露生層", "冠層", "幼樹層", "地被層"], ans: 3, hint: "💡 小提示：地被層位於最底層，陽光被重重樹冠遮擋，水分難以蒸發。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n6. 在熱帶雨林養分循環中，哪一個儲存庫的養分量最大？", keyword: "Q6", options: ["生物量", "枯枝落葉", "土壤", "大氣圈"], ans: 0, hint: "💡 小提示：雨林絕大部分養分都儲存在活生生的植物和動物（生物量）體內。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n7. 傳統遷移耕作中「刀耕火種」的主要作用是？", keyword: "Q7", options: ["驅趕野獸", "釋放生物量中的養分至土壤", "減少溫室氣體", "增加土壤水分"], ans: 1, hint: "💡 小提示：燃燒植物可以將生物量中的養分轉化為灰燼，短暫提升土壤肥力。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n8. 亞馬遜雨林被大規模濫伐的最核心人為活動是？", keyword: "Q8", options: ["種植油棕櫚", "牧牛業", "開採金礦", "興建水壩"], ans: 1, hint: "💡 小提示：在南美洲亞馬遜地區，清理林地作商業牧牛是最主要的伐林原因。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n9. 濫伐林木對當地微氣候的影響包括：\n(1) 日溫差增加\n(2) 相對濕度下降\n(3) 風速減弱", keyword: "Q9", options: ["只有(1)(2)", "只有(1)(3)", "只有(2)(3)", "(1)(2)(3)"], ans: 0, hint: "💡 小提示：失去樹冠遮蔽，日間更熱夜間更冷（溫差增）；失去樹木阻擋，風速會「增加」而非減弱。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n10. 伐林後，水文圈會出現甚麼變化？", keyword: "Q10", options: ["截留增加", "下滲增加", "地表徑流增加", "蒸騰作用增加"], ans: 2, hint: "💡 小提示：沒有樹葉截留和樹根抓緊泥土，雨水直接落到地面，地表徑流大增。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n11. 伐林對養分循環的影響是？", keyword: "Q11", options: ["枯枝落葉層養分增加", "淋溶作用減弱", "生物量養分流失", "土壤肥力永久提升"], ans: 2, hint: "💡 小提示：樹木被砍伐並運走，意味著最大的養分庫（生物量）被直接移除了。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n12. 發展生態旅遊作為保育雨林措施的局限是？", keyword: "Q12", options: ["減少土著就業", "基礎設施建設可能破壞環境", "降低國家收入", "增加非法伐木"], ans: 1, hint: "💡 小提示：建酒店、開路等配套設施本身就會對脆弱的雨林生態造成干擾。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n13. 「選擇性伐木」的缺點包括：\n(1) 營運成本高昂\n(2) 砍伐大樹時會連帶拉倒周邊植被\n(3) 需開闢道路，引來非法伐木者", keyword: "Q13", options: ["只有(1)(2)", "只有(1)(3)", "只有(2)(3)", "(1)(2)(3)"], ans: 3, hint: "💡 小提示：這三項都是選擇性伐木在實際操作上遇到的典型困難。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n14. 認養雨林計劃的主要限制是？", keyword: "Q14", options: ["認養面積通常細小且零碎", "增加政府財政負擔", "導致雨林面積減少", "違反國際法"], ans: 0, hint: "💡 小提示：這類計劃通常由非政府組織推動，資金有限，難以保護大片連續的林地。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n15. 絞殺植物與附生植物的最大分別是？", keyword: "Q15", options: ["絞殺植物生長在地面", "絞殺植物對寄主樹有害", "附生植物不需要陽光", "附生植物吸收寄主養分"], ans: 1, hint: "💡 小提示：附生植物（如蘭花）只借位生長；絞殺植物（如無花果）最終會勒死寄主樹。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n16. 亞馬遜盆地佔全球熱帶雨林面積的多少？", keyword: "Q101", options: ["25%", "30%", "45%", "60%"], ans: 2, hint: "💡 小提示：南美洲亞馬遜盆地是全球最大的熱帶雨林，佔比達 45%。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n17. 熱帶雨林土壤剖面厚達 30 至 50 米的主要原因是？", keyword: "Q102", options: ["強烈的物理風化", "活躍的化學風化", "大量火山灰沉積", "冰川侵蝕"], ans: 1, hint: "💡 小提示：氣候炎熱潮濕，使基岩出現活躍的化學風化，形成深厚的幼細黏土層。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n18. 關於熱帶雨林的微氣候，隨植物高度下降，哪一項數值會增加？", keyword: "Q103", options: ["光度", "溫度", "相對濕度", "風速"], ans: 2, hint: "💡 小提示：冠層以下溫度較低，且冠層鎖住大量來自蒸騰作用的水汽，故相對濕度增加。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n19. 能量流失的「十分一理論」是指？", keyword: "Q104", options: ["只有十分之一的陽光能到達地面", "每一食性層次只有十分之一能量轉移到下一層", "只有十分之一的降雨被截留", "只有十分之一的養分留在土壤"], ans: 1, hint: "💡 小提示：生物在呼吸、排泄及生長時會消耗大量能量，僅 10% 能傳遞給捕食者。" },
        { topic: "C6", q: "[C6 熱帶雨林]\n20. 濫伐林木對大氣圈的影響中，為何伐林後夜間溫度會下降？", keyword: "Q105", options: ["溫室氣體總量減少", "沒有樹冠層和足夠水汽困住熱能", "地表反射率大幅增加", "風速減弱"], ans: 1, hint: "💡 小提示：失去樹冠層的遮蔽和植物蒸騰產生的雲層保溫，夜間熱能流失極快。" },

        { topic: "C7", q: "[C7 氣候變化]\n21. 自然溫室效應的機制是溫室氣體吸收了：", keyword: "Q16", options: ["太陽短波輻射", "太陽長波輻射", "地表釋出的短波輻射", "地表釋出的長波輻射"], ans: 3, hint: "💡 小提示：地球吸收太陽短波後，會以「長波輻射」形式散熱，溫室氣體正是吸收這些長波輻射。" },
        { topic: "C7", q: "[C7 氣候變化]\n22. 下列哪項人類活動會釋出大量甲烷？\n(1) 稻米種植\n(2) 堆填區廢料分解\n(3) 燃燒煤炭發電", keyword: "Q17", options: ["只有(1)(2)", "只有(1)(3)", "只有(2)(3)", "(1)(2)(3)"], ans: 0, hint: "💡 小提示：燃燒煤炭主要釋放二氧化碳；水稻田和垃圾分解的厭氧環境會產生甲烷。" },
        { topic: "C7", q: "[C7 氣候變化]\n23. 氟氯化碳(CFCs)的主要來源是？", keyword: "Q18", options: ["汽車廢氣", "農業化肥", "冷卻劑及噴霧劑", "焚化爐"], ans: 2, hint: "💡 小提示：CFCs 過去廣泛用於冷氣機、雪櫃的製冷劑和噴髮膠等噴霧產品中。" },
        { topic: "C7", q: "[C7 氣候變化]\n24. 全球暖化對水文圈的影響包括：", keyword: "Q19", options: ["全球降雨量平均分佈", "海水受熱膨脹導致海平面上升", "冰川面積擴大", "河流流量永久增加"], ans: 1, hint: "💡 小提示：海平面上升的兩大主因是：陸地冰川融化，以及海水受熱體積膨脹。" },
        { topic: "C7", q: "[C7 氣候變化]\n25. 氣候變化對北極圈的正面影響（短期）包括：\n(1) 航運路線縮短\n(2) 可耕地面積擴大\n(3) 北極熊棲息地增加", keyword: "Q20", options: ["只有(1)(2)", "只有(1)(3)", "只有(2)(3)", "(1)(2)(3)"], ans: 0, hint: "💡 小提示：海冰融化開通了西北航道，氣溫上升也使高緯度地區適合耕種，但北極熊會失去浮冰棲息地。" },
        { topic: "C7", q: "[C7 氣候變化]\n26. 永久凍土融化會帶來甚麼負面影響？", keyword: "Q21", options: ["減少溫室氣體排放", "釋放大量甲烷及潛伏病毒", "增加地表反射率", "穩固建築物地基"], ans: 1, hint: "💡 小提示：凍土中封存了大量遠古有機物，融化分解會釋放甲烷，形成惡性循環。" },
        { topic: "C7", q: "[C7 氣候變化]\n27. 珊瑚白化的主因是？", keyword: "Q22", options: ["海水鹽度下降", "海水溫度及酸度上升", "海平面下降", "紫外線減少"], ans: 1, hint: "💡 小提示：水溫過高會令共生藻離開珊瑚；海洋吸收過多 CO2 導致酸化，阻礙珊瑚鈣化。" },
        { topic: "C7", q: "[C7 氣候變化]\n28. 國際減排協議（如京都議定書）成效受限的原因：\n(1) 缺乏法律約束力或懲罰機制\n(2) 欠發達國家缺乏資金技術\n(3) 擔心拖慢經濟發展", keyword: "Q23", options: ["只有(1)(2)", "只有(1)(3)", "只有(2)(3)", "(1)(2)(3)"], ans: 3, hint: "💡 小提示：國際合作常因國家利益衝突、缺乏強制執行力及經濟考量而受阻。" },

        { topic: "E1", q: "[E1 動態地球]\n70. 導致山泥傾瀉的自然因素包括：\n(1) 斜坡坡度陡峭\n(2) 暴雨增加土壤孔隙水壓\n(3) 植被茂密", keyword: "Q85", options: ["只有(1)(2)", "只有(1)(3)", "只有(2)(3)", "(1)(2)(3)"], ans: 0, hint: "💡 小提示：植被茂密能抓緊泥土，是防止山泥傾瀉的因素，故(3)錯。" },

        { topic: "E4", q: "[E4 珠江三角洲]\n71. 珠三角農業由種植水稻轉向種植蔬菜、花卉（基塘農業/園藝）的主因是？", keyword: "Q91", options: ["氣候變冷", "城市化導致市場需求改變及地價上升", "勞動力大幅增加", "水資源枯竭"], ans: 1, hint: "💡 小提示：城市人口增加對高價值農產品需求大，且農民需種植高利潤作物以應付高地價。" },
        { topic: "E4", q: "[E4 珠江三角洲]\n72. 珠三角工業發展的初期（1980年代）主要依賴甚麼優勢？", keyword: "Q92", options: ["高科技人才", "廉價勞工及土地，以及政策優惠", "豐富的煤鐵資源", "完善的重工業基礎"], ans: 1, hint: "💡 小提示：改革開放初期，珠三角憑藉「前店後廠」模式及低成本吸引外資。" },
        { topic: "E4", q: "[E4 珠江三角洲]\n73. 近年珠三角工業面臨的挑戰是？\n(1) 勞工成本上升\n(2) 土地短缺及租金上升\n(3) 環境污染嚴重", keyword: "Q93", options: ["只有(1)(2)", "只有(1)(3)", "只有(2)(3)", "(1)(2)(3)"], ans: 3, hint: "💡 小提示：隨著經濟發展，昔日的低成本優勢已消失，並留下嚴重的環境代價。" },
        { topic: "E4", q: "[E4 珠江三角洲]\n74. 「騰籠換鳥」政策的目的是？", keyword: "Q94", options: ["發展家禽養殖業", "淘汰低增值、高污染產業，引入高新科技及服務業", "將所有工業遷回農村", "停止所有城市發展"], ans: 1, hint: "💡 小提示：即產業升級轉型，把低端產業趕走（騰籠），換入高端產業（換鳥）。" },
        { topic: "E4", q: "[E4 珠江三角洲]\n75. 珠三角城市化帶來的環境問題包括：", keyword: "Q95", options: ["生物多樣性增加", "農地流失、水質及空氣污染惡化", "溫室氣體排放減少", "熱島效應減弱"], ans: 1, hint: "💡 小提示：急速擴張的城市吞噬了農地，工業和汽車排放造成嚴重污染。" }
    ];

    // 2. 系統變數與存儲
    let stats = JSON.parse(localStorage.getItem('dseGeogMcStatsV2')) || {
        runs: [],
        qStats: []
    };
    
    // 防錯：確保 qStats 長度與題目數量一致
    if (stats.qStats.length !== questions.length) {
        let newQStats = Array(questions.length).fill(null).map(() => ({ correct: 0, wrong: 0 }));
        for(let i=0; i<Math.min(stats.qStats.length, questions.length); i++){
            newQStats[i] = stats.qStats[i];
        }
        stats.qStats = newQStats;
    }

    const topicsList = ["C1", "C2", "C3", "C4", "C5", "C6", "C7", "E1", "E4"];
    const topicNames = {
        "C1": "C1 災害", "C2": "C2 河流與海岸", "C3": "C3 資訊科技工業",
        "C4": "C4 可持續城市", "C5": "C5 農業與飢荒", "C6": "C6 熱帶雨林",
        "C7": "C7 氣候變化", "E1": "E1 動態地球", "E4": "E4 珠江三角洲"
    };

    let currentQIndex = 0;
    let score = 0;
    let startTime = 0;
    let timerInterval;
    let shuffledQuestions = [];
    let currentWrongWords = []; 

    // 3. 介面更新與邏輯
    function initMenu() {
        const recordsDiv = document.getElementById('past-records');
        if (stats.runs.length === 0) {
            recordsDiv.innerHTML = "暫無記錄";
        } else {
            recordsDiv.innerHTML = stats.runs.slice(-5).reverse().map(r => 
                `<div>${r.date} - 得分: <b>${r.score}/20</b> (用時: ${r.time}s)</div>`
            ).join('<hr style="margin:5px 0; border-top:1px dashed #c5d4c1;">');
        }

        const topicsContainer = document.getElementById('topics-container');
        topicsContainer.innerHTML = '';
        
        topicsList.forEach(topic => {
            let topicQs = questions.map((q, idx) => ({...q, origIndex: idx})).filter(q => q.topic === topic);
            if(topicQs.length === 0) return;

            let topicTotalCorrect = 0;
            let topicTotalAttempt = 0;
            let questionsHtml = '';

            topicQs.forEach(q => {
                let s = stats.qStats[q.origIndex];
                let total = s.correct + s.wrong;
                topicTotalCorrect += s.correct;
                topicTotalAttempt += total;
                
                let rateText = total === 0 ? "尚未作答" : `${Math.round((s.correct / total) * 100)}% (${s.correct}/${total})`;
                let colorClass = (total > 0 && (s.correct / total) < 0.5) ? 'text-red' : 'text-green';
                
                questionsHtml += `
                    <div class="stat-item">
                        <div style="font-weight:bold; margin-bottom:4px;">Q: ${q.q.replace(/[.*?]\n/, '')}</div>
                        <div style="color:#4a6b4d; margin-bottom:4px;">答: ${q.options[q.ans]}</div>
                        <div class="${colorClass}">正確率: ${rateText}</div>
                    </div>
                `;
            });

            let topicRateText = topicTotalAttempt === 0 ? "0%" : `${Math.round((topicTotalCorrect / topicTotalAttempt) * 100)}%`;

            let btn = document.createElement('button');
            btn.className = 'topic-btn';
            btn.innerHTML = `<span>${topicNames[topic]}</span> <span>${topicRateText} ▼</span>`;
            
            let contentDiv = document.createElement('div');
            contentDiv.className = 'topic-content hidden';
            contentDiv.innerHTML = questionsHtml;

            btn.onclick = () => {
                contentDiv.classList.toggle('hidden');
            };

            topicsContainer.appendChild(btn);
            topicsContainer.appendChild(contentDiv);
        });
    }

    function showMenu() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
        initMenu();
    }

    function startQuiz() {
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        let c6c7 = questions.map((q, i) => ({...q, origIndex: i})).filter(q => q.topic === 'C6' || q.topic === 'C7');
        let others = questions.map((q, i) => ({...q, origIndex: i})).filter(q => q.topic !== 'C6' && q.topic !== 'C7');
        
        c6c7.sort(() => Math.random() - 0.5);
        others.sort(() => Math.random() - 0.5);
        
        let selected = [...c6c7.slice(0, 14), ...others.slice(0, 6)];
        shuffledQuestions = selected.sort(() => Math.random() - 0.5);
        
        currentQIndex = 0;
        score = 0;
        currentWrongWords = [];
        startTime = Date.now();
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let t = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer').innerText = `時間: ${t}s`;
        }, 1000);

        loadQuestion();
    }

    function loadQuestion() {
        document.getElementById('hint-container').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        
        const qData = shuffledQuestions[currentQIndex];
        document.getElementById('progress').innerText = `進度: ${currentQIndex + 1} / 20`;
        document.getElementById('question-text').innerText = qData.q;
        
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';
        
        qData.options.forEach((opt, idx) => {
            let btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(btn, idx, qData);
            optsContainer.appendChild(btn);
        });
    }

    function handleAnswer(clickedBtn, selectedIdx, qData) {
        const buttons = document.getElementById('options-container').querySelectorAll('button');
        buttons.forEach(btn => btn.disabled = true);

        const isCorrect = (selectedIdx === qData.ans);
        const origIdx = qData.origIndex;

        if (isCorrect) {
            score++;
            stats.qStats[origIdx].correct++;
            clickedBtn.classList.add('correct');
        } else {
            stats.qStats[origIdx].wrong++;
            clickedBtn.classList.add('wrong');
            buttons[qData.ans].classList.add('correct');
            
            if (!currentWrongWords.includes(qData.keyword)) {
                currentWrongWords.push(qData.keyword);
            }
        }

        const hintBox = document.getElementById('hint-container');
        hintBox.innerText = qData.hint;
        hintBox.classList.remove('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentQIndex++;
        if (currentQIndex >= 20) {
            endQuiz();
        } else {
            loadQuestion();
        }
    }

    function endQuiz() {
        clearInterval(timerInterval);
        const timeTaken = Math.floor((Date.now() - startTime) / 1000);
        
        const runData = {
            date: new Date().toLocaleString('zh-HK'),
            score: score,
            time: timeTaken
        };
        stats.runs.push(runData);
        localStorage.setItem('dseGeogMcStatsV2', JSON.stringify(stats));

        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `得分: ${score} / 20`;
        document.getElementById('final-time').innerText = `用時: ${timeTaken} 秒`;
        
        const statusEl = document.getElementById('upload-status');
        statusEl.innerText = "成績上傳中...";
        statusEl.className = "upload-status text-green";

        let wrongWordsStr = currentWrongWords.length > 0 ? currentWrongWords.join('、') : "全對";
        
        // 已更新為您最新提供的 Google Apps Script 網址
        const scriptUrl = "https://script.google.com/macros/s/AKfycbxzTTO1QRUMgTl9cF7bBk566dnRnl0YsGqDe4YATxqL25vIZlDrQnGR967JhRlnmYDT/exec";
        const fetchUrl = `${scriptUrl}?score=${score}&wrongWords=${encodeURIComponent(wrongWordsStr)}`;
        
        fetch(fetchUrl, { mode: 'no-cors' })
            .then(() => {
                statusEl.innerText = "✓ 成績已成功上傳至紀錄表";
            })
            .catch(err => {
                console.error("上傳失敗", err);
                statusEl.innerText = "✗ 上傳紀錄失敗，請檢查網絡";
                statusEl.className = "upload-status text-red";
            });
    }

    initMenu();
</script>

</html>
